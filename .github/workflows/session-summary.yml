# Reusable workflow: post a ClaudeStudio session digest to a PR comment.
#
# Call it from your own workflow after a Claude Code step has produced a session
# JSONL file. See docs/GITHUB_ACTIONS.md for a full example.
name: ClaudeStudio Session Summary

on:
  workflow_call:
    inputs:
      session-path:
        description: 'Path to a Claude Code session JSONL (omit to use the most recent indexed session)'
        required: false
        type: string
    secrets:
      GITHUB_TOKEN:
        description: 'Token used to post the PR comment'
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ClaudeStudio
        run: pip install --quiet .

      - name: Generate the session summary
        id: summary
        run: |
          if [ -n "${{ inputs.session-path }}" ]; then
            claudestudio github-summary --session "${{ inputs.session-path }}" > summary.md
          else
            claudestudio github-summary --last > summary.md
          fi
          cat summary.md

      - name: Comment on the pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
