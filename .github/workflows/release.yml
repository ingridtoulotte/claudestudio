name: Release

# Build the wheel and publish a GitHub Release when a vX.Y.Z tag is pushed.
# The self-test is a hard gate: nothing is released unless it prints ALLPASS,
# proving the shipped artifact is still zero-dependency and correct.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: build wheel + GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Final gate — the package ships only if it self-tests green.
      - name: Self-test (zero dependencies)
        run: python -m claudestudio --selftest

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ClaudeStudio ${{ github.ref_name }} — see [CHANGELOG.md](CHANGELOG.md) for details.

            Install from the attached wheel, or:
            ```bash
            pipx run --spec git+https://github.com/ingridtoulotte/claudestudio claudestudio demo --serve
            ```
