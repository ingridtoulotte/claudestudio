<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ClaudeStudio</title>
  <meta name="description" content="The desktop workspace for Claude Code — explore, search, replay and understand every session." />
  <link rel="icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Primary navigation">
      <div class="brand">
        <img src="assets/icon.svg" alt="" class="brand-mark" width="28" height="28" />
        <div class="brand-text">
          <span class="brand-name">ClaudeStudio</span>
          <span class="brand-sub">workspace</span>
        </div>
      </div>

      <button class="cmdk-trigger" id="cmdk-trigger" title="Search everything (Ctrl/Cmd K)" aria-label="Open search (Ctrl or Cmd K)">
        <svg viewBox="0 0 24 24" width="15" height="15"><path d="M21 21l-4.3-4.3M19 11a8 8 0 1 1-16 0 8 8 0 0 1 16 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Search…</span>
        <kbd>⌘K</kbd>
      </button>

      <nav class="nav" id="nav" aria-label="Views"></nav>

      <div class="sidebar-foot" role="complementary" aria-label="Index status">
        <div class="reindex-row">
          <button class="btn-ghost" id="btn-reindex" title="Re-scan your sessions" aria-label="Sync — re-scan your sessions">
            <svg viewBox="0 0 24 24" width="14" height="14"><path d="M21 12a9 9 0 1 1-2.6-6.3M21 3v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Sync</span>
          </button>
        </div>
        <div class="foot-stats" id="foot-stats"></div>
        <div class="foot-privacy">
          <svg viewBox="0 0 24 24" width="12" height="12"><path d="M12 2l8 4v6c0 5-3.4 8.5-8 10-4.6-1.5-8-5-8-10V6l8-4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          100% local · no telemetry
        </div>
      </div>
    </aside>

    <main class="main" id="view" role="main">
      <div class="loading"><div class="spinner"></div></div>
    </main>
  </div>

  <div class="cmdk-backdrop" id="cmdk" hidden>
    <div class="cmdk-panel" role="dialog" aria-modal="true">
      <div class="cmdk-input-row">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 21l-4.3-4.3M19 11a8 8 0 1 1-16 0 8 8 0 0 1 16 0z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="cmdk-input" type="text" placeholder="Search prompts, responses, tools, projects…" autocomplete="off" spellcheck="false" />
        <kbd>esc</kbd>
      </div>
      <div class="cmdk-results" id="cmdk-results"></div>
    </div>
  </div>

  <div class="toast-host" id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
