name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  selftest:
    name: selftest (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Run self-test (zero dependencies)
        run: python -m claudestudio --selftest

      - name: Smoke test — build demo index
        run: python -m claudestudio demo --count 8

      - name: Smoke test — API layer boots & serves
        shell: bash
        run: |
          python - <<'PY'
          import io, json, urllib.request, threading, time, os, tempfile
          from claudestudio import index, fixtures, server
          tmp = tempfile.mkdtemp()
          root = os.path.join(tmp, "p"); os.makedirs(root)
          fixtures.build_corpus(root, count=6, seed=1)
          db = os.path.join(tmp, "i.db")
          conn = index.connect(db); index.reindex(conn, root); conn.close()
          httpd = server.make_server(db, root, "127.0.0.1", 8911)
          t = threading.Thread(target=httpd.serve_forever, daemon=True); t.start()
          time.sleep(0.5)
          B = "http://127.0.0.1:8911"
          for path in ("/api/summary", "/api/sessions", "/api/analytics", "/api/wrapped", "/api/search?q=async", "/api/saved"):
              with urllib.request.urlopen(B + path) as r:
                  assert r.status == 200, path
                  json.loads(r.read())
          # static SPA serves (web/ ships inside the package)
          with urllib.request.urlopen(B + "/") as r:
              assert r.status == 200 and b"ClaudeStudio" in r.read()
          # export a real session to markdown + standalone html
          sid = json.loads(urllib.request.urlopen(B + "/api/sessions?limit=1").read())["sessions"][0]["session_id"]
          for ext in ("md", "html"):
              with urllib.request.urlopen(B + "/api/session/" + sid + "/export." + ext) as r:
                  assert r.status == 200 and len(r.read()) > 50, ext
          httpd.shutdown()
          print("API smoke OK")
          PY
