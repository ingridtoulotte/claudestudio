name: Publish to PyPI

# Manual trigger on purpose: PyPI publishing uses Trusted Publishing (OIDC), which
# requires a one-time "pending publisher" to be configured on PyPI for this repo +
# the `pypi-release` environment below. Once that's done, run this workflow from
# the Actions tab against a release tag. Keeping it manual means tagging a release
# never produces a spurious failed run before PyPI is set up.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build and publish (e.g. v0.4.0)"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi-release   # add required reviewers here for a manual approval gate
    permissions:
      id-token: write           # OIDC token for Trusted Publishing — no API token stored
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify package metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
