<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-label="ClaudeStudio session replay demo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0d12"/><stop offset="1" stop-color="#090a0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a8cff"/><stop offset="1" stop-color="#ff8a5b"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="16" y="16" width="1248" height="688" rx="16" fill="#14161c" stroke="#262a36"/>

  <!-- title bar -->
  <circle cx="46" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="70" cy="42" r="6" fill="#febc2e"/>
  <circle cx="94" cy="42" r="6" fill="#28c840"/>
  <text x="124" y="48" font-size="17" font-weight="700" fill="#e7e8ee">ClaudeStudio<tspan fill="#8b8fa3" font-weight="400">  ·  session replay</tspan></text>
  <rect x="1058" y="28" width="182" height="28" rx="14" fill="#1b1e27" stroke="#2c3140"/>
  <text x="1149" y="47" font-size="14" text-anchor="middle" fill="#9a8cff" font-family="ui-monospace,Consolas,monospace">claude-opus-4-8</text>
  <line x1="17" y1="64" x2="1263" y2="64" stroke="#23262f"/>

  <!-- message blocks -->
  <g opacity="0" transform="translate(0 14)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1;1;0" keyTimes="0;0.05;0.12;0.95;0.97;1"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" values="0 14;0 14;0 0;0 0;0 0;0 0" keyTimes="0;0.05;0.12;0.95;0.97;1"/>
    <rect x="48" y="86" width="1184" height="92" rx="10" fill="#181b22" stroke="#23272f"/>
    <rect x="48" y="86" width="4" height="92" rx="2" fill="#9a8cff"/>
    <text x="72" y="116" font-size="12" font-weight="800" letter-spacing="1.5" fill="#9a8cff">USER</text>
    <text x="72" y="150" font-size="18" fill="#e7e8ee" font-family="ui-monospace,Consolas,monospace">Fix the failing auth test.</text>
  </g>

  <g opacity="0" transform="translate(0 14)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1;1;0" keyTimes="0;0.20;0.27;0.95;0.97;1"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" values="0 14;0 14;0 0;0 0;0 0;0 0" keyTimes="0;0.20;0.27;0.95;0.97;1"/>
    <rect x="48" y="194" width="1184" height="92" rx="10" fill="#15171d" stroke="#23272f"/>
    <rect x="48" y="194" width="4" height="92" rx="2" fill="#8b8fa3"/>
    <text x="72" y="224" font-size="12" font-weight="800" letter-spacing="1.5" fill="#8b8fa3">THINKING</text>
    <text x="72" y="258" font-size="17" font-style="italic" fill="#aeb2c2" font-family="ui-monospace,Consolas,monospace">Token expiry check uses &lt; instead of &lt;= …</text>
  </g>

  <g opacity="0" transform="translate(0 14)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1;1;0" keyTimes="0;0.35;0.42;0.95;0.97;1"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" values="0 14;0 14;0 0;0 0;0 0;0 0" keyTimes="0;0.35;0.42;0.95;0.97;1"/>
    <rect x="48" y="302" width="1184" height="92" rx="10" fill="#181b22" stroke="#23272f"/>
    <rect x="48" y="302" width="4" height="92" rx="2" fill="#ff8a5b"/>
    <text x="72" y="332" font-size="12" font-weight="800" letter-spacing="1.5" fill="#ff8a5b">EDIT</text>
    <text x="72" y="366" font-size="17" fill="#e7e8ee" font-family="ui-monospace,Consolas,monospace">middleware/auth.ts  <tspan fill="#5ec98a">+1</tspan> <tspan fill="#ff5f57">-1</tspan></text>
  </g>

  <g opacity="0" transform="translate(0 14)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1;1;0" keyTimes="0;0.50;0.57;0.95;0.97;1"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" values="0 14;0 14;0 0;0 0;0 0;0 0" keyTimes="0;0.50;0.57;0.95;0.97;1"/>
    <rect x="48" y="410" width="1184" height="92" rx="10" fill="#15171d" stroke="#23272f"/>
    <rect x="48" y="410" width="4" height="92" rx="2" fill="#5ec98a"/>
    <text x="72" y="440" font-size="12" font-weight="800" letter-spacing="1.5" fill="#5ec98a">BASH</text>
    <text x="72" y="474" font-size="17" fill="#e7e8ee" font-family="ui-monospace,Consolas,monospace">npm test  <tspan fill="#5ec98a">→ 42 passing, 0 failing</tspan></text>
  </g>

  <g opacity="0" transform="translate(0 14)">
    <animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1;1;0" keyTimes="0;0.65;0.72;0.95;0.97;1"/>
    <animateTransform attributeName="transform" type="translate" dur="9s" repeatCount="indefinite" values="0 14;0 14;0 0;0 0;0 0;0 0" keyTimes="0;0.65;0.72;0.95;0.97;1"/>
    <rect x="48" y="518" width="1184" height="92" rx="10" fill="#181b22" stroke="#2a2f3d"/>
    <rect x="48" y="518" width="4" height="92" rx="2" fill="url(#accent)"/>
    <text x="72" y="548" font-size="12" font-weight="800" letter-spacing="1.5" fill="#9a8cff">CLAUDE</text>
    <text x="72" y="582" font-size="17" fill="#e7e8ee" font-family="ui-monospace,Consolas,monospace">Off-by-one in the expiry check. Fixed — tests green.</text>
  </g>

  <!-- transport bar -->
  <polygon points="48,648 48,668 64,658" fill="#9a8cff"/>
  <text x="78" y="664" font-size="13" fill="#8b8fa3" font-family="ui-monospace,Consolas,monospace">0:00 / 3:20</text>
  <rect x="1176" y="646" width="56" height="24" rx="12" fill="#1b1e27" stroke="#2c3140"/>
  <text x="1204" y="662" font-size="12" text-anchor="middle" fill="#9a8cff" font-family="ui-monospace,Consolas,monospace">1.5×</text>

  <rect x="200" y="678" width="900" height="4" rx="2" fill="#2a2e3a"/>
  <rect x="200" y="678" width="0" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" dur="9s" repeatCount="indefinite" values="0;900;900" keyTimes="0;0.95;1"/>
  </rect>
  <circle cx="200" cy="680" r="7" fill="#fff" stroke="#9a8cff" stroke-width="2">
    <animate attributeName="cx" dur="9s" repeatCount="indefinite" values="200;1100;1100" keyTimes="0;0.95;1"/>
  </circle>
</svg>
